version: 2

models:
  - name: device_daily
    description: Gold layer - one row per device per day, daily aggregates (Task 2.3).
    columns:
      - name: device_id
        tests: [not_null]
      - name: event_date
        tests: [not_null]
      - name: event_count
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - device_id
              - event_date
